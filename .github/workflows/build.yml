name: build
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        dotnet-version:
          - "10.0.x"
        sys:
          - "windows-latest"
          - "ubuntu-latest"
          - "macos-latest"

    runs-on: ${{ matrix.sys }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Install libusb (Ubuntu)
        if: matrix.sys == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0

      - name: Install libusb (Windows)
        if: matrix.sys == 'windows-latest'
        run: |
          vcpkg install libusb
          echo "C:\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies (Mac OS)
        if: matrix.sys == 'macos-latest'
        run: |
          brew install libusb
          echo "DYLD_LIBRARY_PATH=$(brew --prefix libusb)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Build
        run: dotnet pack src/LibUsbDotNet/LibUsbDotNet.csproj -c Release -o ${{ github.workspace }}/nuget/

      - name: Test
        run: dotnet test src/LibUsbDotNet.Tests/LibUsbDotNet.Tests.csproj

      - name: Upload LibUsbDotNet NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: LibUsbDotNet-${{ matrix.sys }}-${{ github.run_id }}
          path: "${{ github.workspace }}/nuget/"
